name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows x64
          # 取消注释以启用 macOS / Linux 构建
          # - platform: macos-latest
          #   target: aarch64-apple-darwin
          #   label: macOS ARM
          # - platform: ubuntu-22.04
          #   target: x86_64-unknown-linux-gnu
          #   label: Linux x64

    runs-on: ${{ matrix.platform }}
    name: Build · ${{ matrix.label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies (Windows)
        if: matrix.platform == 'windows-latest'
        shell: powershell
        run: |
          npm ci
          cd frontend
          npm ci

      - name: Install dependencies (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          npm ci
          cd frontend && npm ci

      - name: Install Wix Toolset
        if: matrix.platform == 'windows-latest'
        shell: powershell
        run: |
          dotnet tool install --global wix --version 5.0.2
          echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build frontend
        run: |
          cd frontend && npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.target }} --bundles msi,nsis

      - name: List bundle outputs
        if: always()
        shell: powershell
        run: |
          Get-ChildItem -Recurse src-tauri/target/${{ matrix.target }}/release/bundle | Select-Object FullName, Length

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aigc-gallery-${{ github.ref_name }}-${{ matrix.target }}
          if-no-files-found: error
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          retention-days: 30

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: true
          prerelease: false
          name: AIGC Gallery ${{ github.ref_name }}
          body: |
            Windows installer assets are attached below.
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
